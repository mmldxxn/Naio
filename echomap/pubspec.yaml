name: echomap
description: "Leave memories at places. Discover them in AR."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.4

  # Auth
  google_sign_in: ^6.2.2

  # Image
  cached_network_image: ^3.4.1

  # State & Navigation
  go_router: ^14.8.1
  provider: ^6.1.2

  # UI
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  intl: ^0.20.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
